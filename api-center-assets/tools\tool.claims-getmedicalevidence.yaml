apiVersion: aia.aiassets/v1
kind: McpTool
metadata:
  name: claims-getmedicalevidence
  displayName: Claims.GetMedicalEvidence
  domain: Claims
  version: 1.0.0
  generatedAt: '2026-07-03T21:18:07.107737+00:00'
spec:
  owningMcpServer: claims-mcp-server
  mode: ReadOrchestration
  description: Medical Evidence API + Document API + OCR/Extraction API
  allowedSkills:
  - Claims.ReturnToWorkAssessment
  inputData: claimId; evidenceTypes[]; dateRangeStart; dateRangeEnd
  outputData: 'medicalEvidence: documentId; documentType; documentDate; provider; diagnosis; restrictions; capacityStatement;
    prognosis; sourceReference'
  backendApiMappings:
  - apiName: Medical Evidence API + Document API + OCR/Extraction API
    candidateEndpointOrOperation: GET /claims/{claimId}/medical-evidence; GET /documents?claimId={claimId}&category=medical;
      GET /ocr/extractions?documentIds={ids}
    mappingPattern: multi-api orchestration in MCP tool handler
  handler:
    recommendedRuntime: Azure Function handler or Container App route
    orchestrationResponsibilities:
    - validate input
    - call backend API/API set through APIM
    - normalise response
    - attach source references
    - emit audit event
  controls:
  - validateInputSchema
  - validateCallerAgent
  - validateInvokingSkill
  - validatePurpose
  - emitAuditStartAndEnd
  - returnEvidenceReferences
  - structuredErrors
  errorModel:
  - ValidationError
  - AccessDenied
  - BackendUnavailable
  - PartialResponse
  - NotFound
  - ConflictingSourceData
  - HumanReviewRequired
