apiVersion: aia.aiassets/v1
kind: McpServer
metadata:
  name: policy-mcp-server
  displayName: Policy MCP Server
  domain: Policy
  version: 1.0.0
  lifecycleStage: Pilot
  generatedAt: '2026-07-03T21:18:07.107737+00:00'
spec:
  endpoint: https://<apim-host>/mcp/policy
  recommendedRuntime: Azure Function App / Container App / APIM MCP wrapper
  owner: Policy Platform Technology
  classification: Internal - Policy Terms
  authentication: Microsoft Entra ID / Managed Identity
  frontDoor: Azure API Management
  networking: Private endpoint preferred; public ingress only via APIM where required
  tools:
  - Policy.GetPolicyTerms
  - Policy.GetEligibilityDefinitions
  - Policy.GetOccupationDefinition
  - Policy.GetBenefitDefinition
  auditAndObservability:
    applicationInsights: true
    logAnalytics: true
    auditEvents:
    - toolInvocationStart
    - toolInvocationComplete
    - accessDenied
    - backendFailure
  deploymentValidation:
  - All tools have input/output contracts
  - All tools have allowedSkills
  - External tools enforce human review
  - Write tools require approval controls
