apiVersion: aia.aiassets/v1
kind: ApiInventoryMappingTemplate
metadata:
  name: claim-stability-review-api-inventory-template
  generatedAt: '2026-07-03T21:18:07.107737+00:00'
spec:
  usage: Map existing API inventory to MCP tool requirements. Populate actual API names, owners, endpoints and gaps before
    registration.
  columns:
  - tool
  - candidateApi
  - candidateEndpoint
  - inputDataRequired
  - outputDataRequired
  - existingApiName
  - existingEndpoint
  - apiOwner
  - apimProduct
  - apiCenterAsset
  - gapActionRequired
  mappings:
  - tool: Claims.GenerateHandoverSummary
    owningMcpServer: claims-mcp-server
    candidateApi: Optional Handover Draft API
    candidateEndpointOrOperation: Optional POST /claims/{claimId}/handover-summary/draft
    inputDataRequired: claimId; skillFindings[]; evidenceReferences[]; approvalReference optional if persisting
    outputDataRequired: handoverSummary; criticalInformation[]; outstandingActions[]; sourceReferences[]; draftId optional
    allowedSkills:
    - Claims.ReinsuranceAndHandoverValidation
  - tool: Claims.GetAdvocateCorrespondence
    owningMcpServer: claims-mcp-server
    candidateApi: Correspondence API / Document API
    candidateEndpointOrOperation: GET /claims/{claimId}/advocate-correspondence
    inputDataRequired: claimId; dateRangeStart; dateRangeEnd
    outputDataRequired: 'advocateRecords: recordId; recordDate; party; topic; status; outstandingActions; sourceReference'
    allowedSkills:
    - Claims.EligibilityAndLiabilityValidation
    - Claims.ComplaintAndRemediationValidation
  - tool: Claims.GetAssessmentHistory
    owningMcpServer: claims-mcp-server
    candidateApi: Assessment API + Decision Letter API + Document API
    candidateEndpointOrOperation: GET /claims/{claimId}/assessments; GET /claims/{claimId}/decision-letters; GET /documents?claimId={claimId}&type=assessment
    inputDataRequired: claimId; includeDocuments flag; dateRange optional
    outputDataRequired: 'assessments: assessmentId; assessmentDate; assessmentType; decision; rationale; assessor; relatedDecisionLetters;
      relatedDocumentIds; sourceReference'
    allowedSkills:
    - Claims.EligibilityAndLiabilityValidation
  - tool: Claims.GetBPSAssessment
    owningMcpServer: claims-mcp-server
    candidateApi: Document API / Rehab API
    candidateEndpointOrOperation: GET /documents?claimId={claimId}&category=bps-assessment
    inputDataRequired: claimId
    outputDataRequired: 'bpsAssessments: documentId; assessmentDate; biologicalFactors; psychologicalFactors; socialFactors;
      impactOnRTW; sourceReference'
    allowedSkills:
    - Claims.ReturnToWorkAssessment
  - tool: Claims.GetClaimAuditHistory
    owningMcpServer: claims-mcp-server
    candidateApi: Claims Audit API
    candidateEndpointOrOperation: GET /claims/{claimId}/audit?fields={fieldNames}
    inputDataRequired: claimId; fieldNames[]; dateRange optional
    outputDataRequired: 'auditEvents: eventId; fieldName; oldValue; newValue; changedBy; changedAt; sourceReference'
    allowedSkills:
    - Claims.DataIntegrityReview
  - tool: Claims.GetClaimDetails
    owningMcpServer: claims-mcp-server
    candidateApi: Claims API
    candidateEndpointOrOperation: GET /claims/{claimId}
    inputDataRequired: claimId
    outputDataRequired: claimId; policyId; customerId; claimStatus; claimType; dateOfLoss; claimStartDate; benefitStartDate;
      benefitEndDate; assignedCaseManager; sourceReference
    allowedSkills:
    - Claims.DataIntegrityReview
  - tool: Claims.GetClaimDuration
    owningMcpServer: claims-mcp-server
    candidateApi: Claims API
    candidateEndpointOrOperation: GET /claims/{claimId}/dates
    inputDataRequired: claimId; asAtDate
    outputDataRequired: claimStartDate; asAtDate; currentDurationInDays; currentDurationInMonths; milestoneDates
    allowedSkills:
    - Claims.ReturnToWorkAssessment
  - tool: Claims.GetClaimKeyDates
    owningMcpServer: claims-mcp-server
    candidateApi: Claims API / Indexation API
    candidateEndpointOrOperation: GET /claims/{claimId}/key-dates; GET /claims/{claimId}/indexation
    inputDataRequired: claimId; reviewAsAtDate
    outputDataRequired: dateOfLoss; benefitEndDate; claimDurationExpiryDate; changeOfDefinitionDate; cpiIndexationDate; pdiIndexationDate;
      missingFields; inconsistentFields; sourceReference
    allowedSkills:
    - Claims.DataIntegrityReview
  - tool: Claims.GetClaimPeriod
    owningMcpServer: claims-mcp-server
    candidateApi: Claims API
    candidateEndpointOrOperation: GET /claims/{claimId}/period
    inputDataRequired: claimId; reviewAsAtDate
    outputDataRequired: claimStartDate; claimEndDate; reviewAsAtDate; comparisonPeriodStart; comparisonPeriodEnd
    allowedSkills:
    - Claims.InvestigationAndUndisclosedWorkAssessment
  - tool: Claims.GetComplaintHistory
    owningMcpServer: claims-mcp-server
    candidateApi: Complaint API
    candidateEndpointOrOperation: GET /claims/{claimId}/complaints; GET /customers/{customerId}/complaints?claimId={claimId}
    inputDataRequired: claimId; customerId optional
    outputDataRequired: 'complaints: complaintId; openedDate; closedDate; status; issue; outcome; outstandingActions; sourceReference'
    allowedSkills:
    - Claims.ComplaintAndRemediationValidation
  - tool: Claims.GetComplaintOutcomeLetters
    owningMcpServer: claims-mcp-server
    candidateApi: Document API / Complaint API
    candidateEndpointOrOperation: GET /claims/{claimId}/complaints/{complaintId}/outcome-letters
    inputDataRequired: claimId; complaintId
    outputDataRequired: 'outcomeLetters: documentId; letterDate; outcome; sourceReference'
